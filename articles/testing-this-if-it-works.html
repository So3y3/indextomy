*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root {

    }
body{font-family:var(--font-body);background:var(--parchment);color:var(--deep-forest);line-height:1.6}
a{color:inherit;text-decoration:none}
nav{position:fixed;top:0;left:0;right:0;z-index:1000;padding:0 2rem;height:70px;display:flex;align-items:center;justify-content:space-between;background:rgba(245,241,234,0.92);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);box-shadow:0 1px 0 rgba(28,40,35,0.08);}

.nav-links-article a{font-size:0.875rem;font-weight:500;color:var(--slate-mist);text-decoration:none;transition:color 0.2s}
.nav-links-article a:hover,.nav-active-link{color:var(--deep-forest)!important;font-weight:600}
.nav-back{font-size:0.8rem;color:var(--slate-mist);display:flex;align-items:center;gap:0.4rem;transition:color 0.2s}
.nav-back:hover{color:var(--warm-gold)}

.article-tag{font-size:0.7rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--warm-gold);border:1px solid var(--warm-gold);padding:0.25rem 0.7rem;border-radius:20px}
.article-date,.article-read{font-size:0.8rem;color:var(--slate-mist)}

.article-excerpt{font-size:1.05rem;color:var(--slate-mist);line-height:1.7;margin-bottom:2.5rem;padding-bottom:2rem;border-bottom:1px solid var(--sea-glass)}

.article-body h2{font-family:var(--font-heading);font-size:1.75rem;font-weight:300;margin:2.5rem 0 1rem;color:var(--deep-forest)}

.article-body li{margin-bottom:0.5rem}
.author-bar{margin-top:3rem;padding:1.5rem;background:white;border-radius:12px;border:1px solid var(--sea-glass);display:flex;gap:1.25rem;align-items:center}

.author-name{font-weight:600;font-size:0.9rem;margin-bottom:0.2rem}
.author-bio{font-size:0.8rem;color:var(--slate-mist)}

<script>
    function toggleMenu() {
      document.getElementById('navLinks').classList.toggle('open');
    }
    function closeMenu() {
      document.getElementById('navLinks').classList.remove('open');
    }
    window.addEventListener('scroll', () => {
      document.getElementById('navbar').classList.toggle('scrolled', window.scrollY > 40);
    });
